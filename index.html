<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CreepCheck</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>CreepCheck</h1>

    <p class="subtitle">
      Track subscription price increases before they quietly drain your wallet.
    </p>

    <div class="summary-card">
      <h2 id="total-increase"></h2>
    </div>

    <table>
      <thead>
        <tr>
          <th>Service</th>
          <th>Old Price</th>
          <th>New Price</th>
          <th>% Increase</th>
        </tr>
      </thead>

      <tbody id="subscription-table">
      </tbody>
    </table>

  </div>

  <script src="script.js"></script>

</body>
</html>
