<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CreepCheck</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>CreepCheck</h1>

    <p class="subtitle">
      Track sneaky subscription price increases before they drain your wallet.
    </p>

    <div class="summary-card">
      <h2 id="total-increase"></h2>
    </div>

    <div class="form-card">

      <h3>Add Subscription</h3>

      <input
        type="text"
        id="name"
        placeholder="Subscription Name"
      >

      <input
        type="number"
        id="old-price"
        placeholder="Old Price"
      >

      <input
        type="number"
        id="new-price"
        placeholder="New Price"
      >

      <button id="add-btn">
        Add Subscription
      </button>

    </div>

    <table>

      <thead>
        <tr>
          <th>Service</th>
          <th>Old Price</th>
          <th>New Price</th>
          <th>% Increase</th>
        </tr>
      </thead>

      <tbody id="subscription-table">
      </tbody>

    </table>

  </div>

  <script src="script.js"></script>

</body>
</html>
